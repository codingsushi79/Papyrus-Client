name: Build Papyrus Client

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  mod:
    name: Build papyrus-shield mod
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - mc: '1.21.1'
            project: mod
            yarn: '1.21.1+build.3'
            loader: '0.16.14'
            fabric: '0.116.4+1.21.1'
            java: '21'
          - mc: '1.21.4'
            project: mod
            yarn: '1.21.4+build.8'
            loader: '0.16.14'
            fabric: '0.119.2+1.21.4'
            java: '21'
          - mc: '1.21.8'
            project: mod
            yarn: '1.21.8+build.1'
            loader: '0.16.14'
            fabric: '0.136.1+1.21.8'
            java: '21'
          - mc: '1.21.10'
            project: mod
            yarn: '1.21.10+build.3'
            loader: '0.18.1'
            fabric: '0.138.3+1.21.10'
            java: '21'
          - mc: '1.21.11'
            project: mod
            yarn: '1.21.11+build.6'
            loader: '0.18.1'
            fabric: '0.141.4+1.21.11'
            java: '21'
          - mc: '26.1.2'
            project: mod-unobf
            yarn: ''
            loader: '0.18.4'
            fabric: '0.152.1+26.1.2'
            java: '25'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Build mod (${{ matrix.mc }})
        working-directory: ${{ matrix.project }}
        run: |
          if [ "${{ matrix.project }}" = "mod" ]; then
            cat > gradle.properties <<EOF
          org.gradle.jvmargs=-Xmx2G
          minecraft_version=${{ matrix.mc }}
          yarn_mappings=${{ matrix.yarn }}
          loader_version=${{ matrix.loader }}
          fabric_version=${{ matrix.fabric }}
          mod_version=${{ github.ref_type == 'tag' && github.ref_name || 'dev-SNAPSHOT' }}
          maven_group=dev.sushimc.papyrus
          archives_base_name=papyrus-shield
          EOF
          else
            cat > gradle.properties <<EOF
          org.gradle.jvmargs=-Xmx2G
          minecraft_version=${{ matrix.mc }}
          loader_version=${{ matrix.loader }}
          fabric_version=${{ matrix.fabric }}
          mod_version=${{ github.ref_type == 'tag' && github.ref_name || 'dev-SNAPSHOT' }}
          maven_group=dev.sushimc.papyrus
          archives_base_name=papyrus-shield
          EOF
          fi
          gradle wrapper --gradle-version 9.5
          ./gradlew build --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: papyrus-shield-${{ matrix.mc }}
          path: ${{ matrix.project }}/build/libs/papyrus-shield-${{ matrix.mc }}-*.jar

  launcher:
    name: Build launcher
    needs: mod
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Download mod jars
        uses: actions/download-artifact@v4
        with:
          pattern: papyrus-shield-*
          path: mod/build/libs
          merge-multiple: true
      - name: Install & build launcher
        working-directory: launcher
        run: |
          npm install
          npm run build:main
          npm run build:renderer
      - name: Set launcher version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: launcher
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
      - name: Package Electron app
        working-directory: launcher
        run: npx electron-builder --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: papyrus-client-${{ matrix.os }}
          path: |
            launcher/release/*.pkg
            launcher/release/*Setup*.exe
            launcher/release/*-arm64-mac.zip
            launcher/release/latest.yml
            launcher/release/latest-mac.yml
            launcher/release/*.blockmap

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [mod, launcher]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Prepare release assets
        run: |
          mkdir -p release
          find artifacts -type f -name 'papyrus-shield-*-*.jar' -exec cp {} release/ \;
          find artifacts -type f -name '*.pkg' -exec cp {} release/ \;
          find artifacts -type f -name '*Setup*.exe' -exec cp {} release/ \;
          find artifacts -type f -name 'latest.yml' -exec cp {} release/ \;
          find artifacts -type f -name 'latest-mac.yml' -exec cp {} release/ \;
          find artifacts -type f -name '*.blockmap' -exec cp {} release/ \;
          find artifacts -type f -name '*-arm64-mac.zip' -exec cp {} release/ \;
          echo "Release files:"
          ls -la release/
          test "$(find release -maxdepth 1 -name 'papyrus-shield-*-*.jar' | wc -l)" -eq 6
          test "$(find release -maxdepth 1 -name '*.pkg' | wc -l)" -ge 1
          test "$(find release -maxdepth 1 -name '*Setup*.exe' | wc -l)" -ge 1
          test "$(find release -maxdepth 1 -name 'latest.yml' | wc -l)" -eq 1
          test "$(find release -maxdepth 1 -name 'latest-mac.yml' | wc -l)" -eq 1
          test "$(find release -maxdepth 1 -name '*-arm64-mac.zip' | wc -l)" -ge 1
      - name: Remove stale release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release view "$tag" --json assets -q '.assets[].id' | while read -r id; do
              gh api -X DELETE "repos/${{ github.repository }}/releases/assets/${id}" || true
            done
          fi
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          overwrite_files: true
          fail_on_unmatched_files: true
